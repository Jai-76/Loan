{% extends 'base.html' %}{% block title %}Register – Loan Prediction{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-box fade">
    <div class="auth-logo">
      <a href="{{ url_for('index') }}" class="brand" style="justify-content:center;font-size:1.3rem">
        <span class="brand-icon">💳</span> Loan <em>Prediction</em>
      </a>
    </div>
    <div class="auth-title"><h2>Create Account</h2><p>Start your loan journey today</p></div>

    <a href="{{ url_for('demo_login') }}" class="demo-btn">
      <span>🎮</span> Skip – Try Demo Account Instantly
    </a>
    <div class="divider">or create a new account</div>

    <form method="POST">
      <div class="form-group">
        <label>Full Name</label>
        <div class="icon-inp"><span class="ic">👤</span>
          <input type="text" name="name" class="inp" placeholder="Alex Johnson" required/></div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <div class="icon-inp"><span class="ic">📧</span>
          <input type="email" name="email" class="inp" placeholder="you@email.com" required/></div>
      </div>
      <div class="form-group">
        <label>Phone</label>
        <div class="icon-inp"><span class="ic">📱</span>
          <input type="tel" name="phone" class="inp" placeholder="+91 98765 43210"/></div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="icon-inp"><span class="ic">🔒</span>
          <input type="password" name="password" class="inp" placeholder="Min. 6 characters" required minlength="6"/></div>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg mt8">Create Account →</button>
    </form>
    <div class="auth-switch">Have an account? <a href="{{ url_for('login') }}">Sign in</a></div>
  </div>
</div>
{% endblock %}
